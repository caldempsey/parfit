# release-plz configuration.
#
# Why git_release_enable = false: goreleaser's release.yml creates the
# GitHub Release itself (with prebuilt binary archives, checksums, and
# the Homebrew formula push to caldempsey/homebrew-parfit).  Letting
# release-plz create a release first causes goreleaser to fail because
# the release already exists.  Ownership: release-plz tags + publishes
# to crates.io; goreleaser creates the GitHub Release, uploads the
# binary archives, and pushes the Homebrew formula.

[workspace]
git_release_enable = false
