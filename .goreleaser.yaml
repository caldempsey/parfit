version: 2

project_name: parfit

before:
  hooks:
    - rustup default stable
    - cargo install --locked cargo-zigbuild

builds:
  - builder: rust
    binary: parfit
    flags:
      - --release
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin
      - x86_64-pc-windows-gnu

archives:
  - name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Target }}
    formats: [tar.xz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "{{ .ProjectName }}-{{ .Version }}-checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: caldempsey
    name: parfit
  draft: false
  prerelease: auto

brews:
  - name: parfit
    repository:
      owner: caldempsey
      name: homebrew-parfit
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/caldempsey/parfit
    description: Paragraph fit — a codebase-aware comment reflow tool that wraps prose with optimal-fit line breaking and leaves directives alone. Inspired by par.
    license: MIT
    commit_author:
      name: caldempsey
      email: callumdempseyleach@gmail.com
    commit_msg_template: "{{ .ProjectName }} {{ .Tag }}"
    install: |
      bin.install "parfit"
    test: |
      system "#{bin}/parfit", "--version"
